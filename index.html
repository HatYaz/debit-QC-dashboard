<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<title>Débit Québec — Dashboard avancé</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

<style>
body {
    margin:0;
    font-family:"Segoe UI", Arial;
    background:#0b1220;
    color:#e5e7eb;
}

header {
    background:#0f172a;
    padding:14px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    border-bottom:1px solid #1f2937;
}

h1 {
    margin:0;
    font-size:16px;
    color:#93c5fd;
}

button {
    background:#2563eb;
    color:white;
    border:none;
    padding:8px 12px;
    border-radius:8px;
    cursor:pointer;
    margin-left:6px;
}

button:hover { background:#1d4ed8; }

.container { padding:18px; }

.card {
    background:#111827;
    padding:14px;
    border-radius:12px;
    border:1px solid #1f2937;
    margin-bottom:18px;
}

canvas {
    width:100% !important;
    height:360px !important;
}

select {
    padding:8px;
    border-radius:6px;
    background:#111827;
    color:white;
    border:1px solid #1f2937;
}

table {
    width:100%;
    border-collapse:collapse;
}

th, td {
    padding:10px;
    border-bottom:1px solid #1f2937;
}

th {
    color:#93c5fd;
    text-align:left;
}

td { text-align:right; }

td:first-child { text-align:left; }

#status {
    color:#fbbf24;
    margin-bottom:10px;
    font-size:13px;
}
</style>
</head>

<body>

<header>
    <h1>Débit Québec — Analyse mensuelle</h1>
    <div>
        <button onclick="refresh()">🔄 Mise à jour</button>
        <button onclick="downloadCSV()">⬇ CSV</button>
    </div>
</header>

<div class="container">

<div id="status">Chargement...</div>

<div class="card">
    <h3>📈 Débit annuel</h3>
    <canvas id="annualChart"></canvas>
</div>

<div class="card">
    <h3>📊 Débit mensuel (total)</h3>
    <canvas id="monthlyChart"></canvas>
</div>

<div class="card">
    <h3>📅 Analyse par mois</h3>

    <label>Mois :</label>
    <select id="monthSelect" onchange="renderMonthDetail()"></select>

    <canvas id="monthDetailChart" style="margin-top:12px;"></canvas>
</div>

<div class="card">
    <h3>📋 Statistiques globales</h3>
    <table>
        <tbody id="stats"></tbody>
    </table>
</div>

</div>

<script>

const CSV_URL = "./data.csv";

let annualChart, monthlyChart, detailChart;
let DATA;

// ================= LOAD =================
async function load(){

    const res = await fetch(CSV_URL + "?v=" + Date.now());
    const text = await res.text();

    const parsed = Papa.parse(text, {
        header:true,
        skipEmptyLines:true,
        delimitersToGuess:["\t",",",";"]
    });

    let raw = [];

    parsed.data.forEach(r=>{
        if(!r.Date || !r.Debit) return;

        raw.push({
            date: r.Date,
            debit: parseFloat(r.Debit)
        });
    });

    DATA = process(raw);
    renderAll();
}

// ================= PROCESS =================
function process(raw){

    let values = raw.map(d=>d.debit);

    let sum = values.reduce((a,b)=>a+b,0);
    let mean = sum / values.length;
    let min = Math.min(...values);
    let max = Math.max(...values);

    // MONTHLY aggregation
    let monthly = {};
    raw.forEach(r=>{
        let m = r.date.slice(3,10);
        if(!monthly[m]) monthly[m] = 0;
        monthly[m] += r.debit;
    });

    return {
        raw,
        stats:{sum,mean,min,max},
        monthly:{
            labels:Object.keys(monthly),
            values:Object.values(monthly)
        }
    };
}

// ================= RENDER ALL =================
function renderAll(){
    renderAnnual();
    renderMonthly();
    renderStats();
    fillMonthSelector();
}

// ================= ANNUAL =================
function renderAnnual(){

    if(annualChart) annualChart.destroy();

    annualChart = new Chart(document.getElementById("annualChart"), {
        type:"line",
        data:{
            labels: DATA.raw.map(d=>d.date),
            datasets:[{
                data: DATA.raw.map(d=>d.debit),
                borderColor:"#60a5fa",
                pointRadius:0
            }]
        },
        options:{plugins:{legend:{display:false}}}
    });
}

// ================= MONTHLY =================
function renderMonthly(){

    if(monthlyChart) monthlyChart.destroy();

    monthlyChart = new Chart(document.getElementById("monthlyChart"), {
        type:"bar",
        data:{
            labels: DATA.monthly.labels,
            datasets:[{
                data: DATA.monthly.values,
                backgroundColor:"#2563eb"
            }]
        },
        options:{plugins:{legend:{display:false}}}
    });
}

// ================= MONTH SELECTOR =================
function fillMonthSelector(){

    const sel = document.getElementById("monthSelect");
    sel.innerHTML = "";

    DATA.monthly.labels.forEach(m=>{
        let opt = document.createElement("option");
        opt.value = m;
        opt.innerText = m;
        sel.appendChild(opt);
    });

    renderMonthDetail();
}

// ================= MONTH DETAIL =================
function renderMonthDetail(){

    const month = document.getElementById("monthSelect").value;
    const data = DATA.raw.filter(d => d.date.includes(month));

    if(detailChart) detailChart.destroy();

    detailChart = new Chart(document.getElementById("monthDetailChart"), {
        type:"line",
        data:{
            labels: data.map(d=>d.date),
            datasets:[{
                data: data.map(d=>d.debit),
                borderColor:"#22c55e",
                pointRadius:2
            }]
        },
        options:{
            plugins:{legend:{display:false}}
        }
    });
}

// ================= STATS =================
function renderStats(){

    const s = DATA.stats;

    const rows = [
        ["Somme", s.sum],
        ["Moyenne", s.mean],
        ["Minimum", s.min],
        ["Maximum", s.max]
    ];

    const tbody = document.getElementById("stats");
    tbody.innerHTML = "";

    rows.forEach(r=>{
        let tr = document.createElement("tr");
        tr.innerHTML = `
            <td>${r[0]}</td>
            <td>${r[1].toFixed(2)}</td>
        `;
        tbody.appendChild(tr);
    });
}

// ================= DOWNLOAD =================
function downloadCSV(){
    window.location.href = CSV_URL;
}

// ================= REFRESH =================
function refresh(){
    load();
}

load();

</script>

</body>
</html>
