<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Débit Québec — Tableau de bord exécutif</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

<style>

:root{
    --bg:#0b1220;
    --panel:#111827;
    --border:#1f2937;
    --text:#e5e7eb;
    --muted:#93c5fd;
    --accent:#60a5fa;
    --green:#22c55e;
}

body{
    margin:0;
    font-family:"Segoe UI", system-ui, Arial;
    background:var(--bg);
    color:var(--text);
}

/* HEADER */
header{
    position:sticky;
    top:0;
    z-index:100;
    background:rgba(15,23,42,0.95);
    backdrop-filter: blur(10px);
    border-bottom:1px solid var(--border);
    padding:16px 22px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

header h1{
    margin:0;
    font-size:15px;
    letter-spacing:0.5px;
    color:var(--muted);
}

.actions button{
    background:#2563eb;
    border:none;
    color:white;
    padding:9px 14px;
    border-radius:10px;
    margin-left:8px;
    cursor:pointer;
    font-weight:500;
}

.actions button:hover{
    background:#1d4ed8;
}

/* LAYOUT */
.container{
    padding:22px;
    max-width:1400px;
    margin:auto;
}

/* GRID */
.grid{
    display:grid;
    grid-template-columns:repeat(12,1fr);
    gap:16px;
}

/* CARDS */
.card{
    background:var(--panel);
    border:1px solid var(--border);
    border-radius:16px;
    padding:16px;
    box-shadow:0 10px 30px rgba(0,0,0,0.25);
}

.card h3{
    margin:0 0 12px 0;
    font-size:13px;
    color:var(--muted);
    letter-spacing:0.4px;
}

/* KPI */
.kpi{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:14px;
    margin-bottom:18px;
}

.kpi-box{
    background:var(--panel);
    border:1px solid var(--border);
    border-radius:14px;
    padding:14px;
}

.kpi-title{
    font-size:12px;
    color:var(--muted);
}

.kpi-value{
    font-size:20px;
    font-weight:700;
    color:var(--accent);
    margin-top:6px;
}

/* CHART */
canvas{
    width:100% !important;
    height:420px !important;
}

/* TABLE */
table{
    width:100%;
    border-collapse:collapse;
}

th, td{
    padding:10px 12px;
    border-bottom:1px solid var(--border);
}

th{
    color:var(--muted);
    text-align:left;
    font-size:12px;
}

td{
    text-align:right;
}

td:first-child{
    text-align:left;
}

/* STATUS */
#status{
    font-size:12px;
    color:#fbbf24;
    margin-bottom:10px;
}

/* SELECT */
select{
    padding:8px 10px;
    border-radius:10px;
    background:var(--panel);
    border:1px solid var(--border);
    color:var(--text);
}

</style>
</head>

<body>

<header>
    <h1>Débit Québec — Tableau de bord exécutif</h1>
    <div class="actions">
        <button onclick="refresh()">🔄 Mise à jour</button>
        <button onclick="downloadCSV()">⬇ Télécharger CSV</button>
    </div>
</header>

<div class="container">

<div id="status">Chargement des données...</div>

<!-- KPI -->
<div class="kpi" id="kpi"></div>

<!-- ANNUAL -->
<div class="card">
    <h3>📈 Débit annuel</h3>
    <canvas id="annualChart"></canvas>
</div>

<!-- MONTHLY -->
<div class="card">
    <h3>📊 Débit mensuel (total)</h3>
    <canvas id="monthlyChart"></canvas>
</div>

<!-- MONTH DETAIL -->
<div class="card">
    <h3>📅 Analyse par mois</h3>
    <select id="monthSelect" onchange="renderMonthDetail()"></select>
    <canvas id="monthChart" style="margin-top:14px;"></canvas>
</div>

<!-- STATS -->
<div class="card">
    <h3>📋 Statistiques</h3>
    <table>
        <tbody id="stats"></tbody>
    </table>
</div>

</div>

<script>

const CSV_URL = "./data.csv";

let annualChart, monthlyChart, monthChart;
let DATA;

// ================= LOAD =================
async function load(){

    const res = await fetch(CSV_URL + "?v=" + Date.now());
    const text = await res.text();

    const parsed = Papa.parse(text, {
        header:true,
        skipEmptyLines:true,
        delimitersToGuess:["\t",",",";"]
    });

    let raw = [];

    parsed.data.forEach(r=>{
        if(!r.Date || !r.Debit) return;

        raw.push({
            date:r.Date,
            debit:parseFloat(r.Debit)
        });
    });

    DATA = process(raw);
    renderAll();
}

// ================= PROCESS =================
function process(raw){

    const values = raw.map(d=>d.debit);

    const sum = values.reduce((a,b)=>a+b,0);
    const mean = sum / values.length;
    const min = Math.min(...values);
    const max = Math.max(...values);

    // monthly
    const monthly = {};
    raw.forEach(r=>{
        const m = r.date.slice(3,10);
        monthly[m] = (monthly[m] || 0) + r.debit;
    });

    return {
        raw,
        kpi:{sum,mean,min,max},
        monthly:{
            labels:Object.keys(monthly),
            values:Object.values(monthly)
        }
    };
}

// ================= RENDER =================
function renderAll(){
    renderKPI();
    renderAnnual();
    renderMonthly();
    fillMonths();
    renderStats();
}

// ================= KPI =================
function renderKPI(){

    const k = DATA.kpi;

    const html = [
        ["Somme",k.sum],
        ["Moyenne",k.mean],
        ["Min",k.min],
        ["Max",k.max]
    ].map(x=>`
        <div class="kpi-box">
            <div class="kpi-title">${x[0]}</div>
            <div class="kpi-value">${x[1].toFixed(2)}</div>
        </div>
    `).join("");

    document.getElementById("kpi").innerHTML = html;
}

// ================= ANNUAL =================
function renderAnnual(){

    if(annualChart) annualChart.destroy();

    annualChart = new Chart(document.getElementById("annualChart"),{
        type:"line",
        data:{
            labels:DATA.raw.map(d=>d.date),
            datasets:[{
                data:DATA.raw.map(d=>d.debit),
                borderColor:"#60a5fa",
                pointRadius:0,
                tension:0.25
            }]
        },
        options:{
            responsive:true,
            plugins:{legend:{display:false}}
        }
    });
}

// ================= MONTHLY =================
function renderMonthly(){

    if(monthlyChart) monthlyChart.destroy();

    monthlyChart = new Chart(document.getElementById("monthlyChart"),{
        type:"bar",
        data:{
            labels:DATA.monthly.labels,
            datasets:[{
                data:DATA.monthly.values,
                backgroundColor:"#2563eb"
            }]
        },
        options:{plugins:{legend:{display:false}}}
    });
}

// ================= MONTH SELECT =================
function fillMonths(){

    const sel = document.getElementById("monthSelect");
    sel.innerHTML = "";

    DATA.monthly.labels.forEach(m=>{
        const opt = document.createElement("option");
        opt.value = m;
        opt.innerText = m;
        sel.appendChild(opt);
    });

    renderMonthDetail();
}

// ================= MONTH DETAIL =================
function renderMonthDetail(){

    const m = document.getElementById("monthSelect").value;
    const data = DATA.raw.filter(d=>d.date.includes(m));

    if(monthChart) monthChart.destroy();

    monthChart = new Chart(document.getElementById("monthChart"),{
        type:"line",
        data:{
            labels:data.map(d=>d.date),
            datasets:[{
                data:data.map(d=>d.debit),
                borderColor:"#22c55e",
                pointRadius:2
            }]
        },
        options:{plugins:{legend:{display:false}}}
    });
}

// ================= STATS =================
function renderStats(){

    const k = DATA.kpi;

    const rows = [
        ["Somme",k.sum],
        ["Moyenne",k.mean],
        ["Minimum",k.min],
        ["Maximum",k.max]
    ];

    document.getElementById("stats").innerHTML =
        rows.map(r=>`
        <tr>
            <td>${r[0]}</td>
            <td>${r[1].toFixed(2)}</td>
        </tr>
        `).join("");
}

// ================= DOWNLOAD =================
function downloadCSV(){
    window.location.href = CSV_URL;
}

// ================= REFRESH =================
function refresh(){
    load();
}

load();

</script>

</body>
</html>
