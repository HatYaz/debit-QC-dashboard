<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<title>Débit Québec Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

<style>
body {
    margin:0;
    font-family:"Segoe UI", Arial;
    background:#0b1220;
    color:#e5e7eb;
}

header {
    background:#0f172a;
    padding:14px 18px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    border-bottom:1px solid #1f2937;
}

h1 {
    margin:0;
    font-size:16px;
    color:#93c5fd;
}

button {
    background:#2563eb;
    color:white;
    border:none;
    padding:8px 12px;
    border-radius:8px;
    cursor:pointer;
}

button:hover { background:#1d4ed8; }

.container {
    padding:18px;
}

.card {
    background:#111827;
    padding:14px;
    border-radius:12px;
    border:1px solid #1f2937;
    margin-top:18px;
}

.kpi {
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:12px;
}

.kpi-box {
    background:#111827;
    padding:14px;
    border-radius:12px;
    border:1px solid #1f2937;
}

.kpi-value {
    font-size:18px;
    font-weight:700;
    color:#60a5fa;
}

canvas {
    width:100% !important;
    height:420px !important;
}

#status {
    margin:10px 0;
    color:#fbbf24;
    font-size:13px;
}
</style>
</head>

<body>

<header>
    <h1>Débit Québec — Dashboard</h1>
    <button onclick="refreshData()">🔄 Mise à jour</button>
</header>

<div class="container">

<div id="status">Chargement des données...</div>

<div id="kpi" class="kpi"></div>

<div class="card">
    <canvas id="chart"></canvas>
</div>

</div>

<script>

// ================= FILE =================
// GitHub Pages: file must be in same repo as index.html
const CSV_URL = "./data.csv";

let chart = null;
let DATA = null;

// ================= LOAD =================
async function loadData(){

    try {

        document.getElementById("status").innerText =
            "Chargement data.csv...";

        const res = await fetch(CSV_URL + "?v=" + Date.now());
        const text = await res.text();

        // 🔥 Detect broken fetch
        if (!text || text.includes("<html")) {
            throw new Error("Fichier non chargé (HTML reçu au lieu de CSV)");
        }

        // ================= PARSE (TSV SAFE) =================
        const parsed = Papa.parse(text, {
            header: true,
            skipEmptyLines: true,
            delimitersToGuess: ["\t", ",", ";"]
        });

        let dates = [];
        let values = [];

        for (let r of parsed.data) {

            const date = r.Date || r.date;
            const debit = r.Debit || r.debit;

            if (!date || !debit) continue;

            const v = parseFloat(debit);
            if (isNaN(v)) continue;

            dates.push(date);
            values.push(v);
        }

        if (values.length === 0) {
            throw new Error("Aucune donnée valide trouvée (vérifie Date / Debit)");
        }

        DATA = build(dates, values);
        render();

        document.getElementById("status").innerText =
            "✔ " + values.length + " points chargés";

    } catch (err) {
        console.error(err);
        document.getElementById("status").innerText =
            "❌ Erreur: " + err.message;
    }
}

// ================= BUILD =================
function build(dates, values){

    const sum = values.reduce((a,b)=>a+b,0);
    const mean = sum / values.length;
    const min = Math.min(...values);
    const max = Math.max(...values);

    return {
        dates,
        values,
        kpi: { mean, min, max, sum }
    };
}

// ================= RENDER =================
function render(){
    renderKPI();
    renderChart();
}

// ================= KPI =================
function renderKPI(){

    const el = document.getElementById("kpi");
    el.innerHTML = "";

    const k = DATA.kpi;

    [
        ["Moyenne", k.mean],
        ["Min", k.min],
        ["Max", k.max],
        ["Somme", k.sum]
    ].forEach(x=>{
        const div = document.createElement("div");
        div.className = "kpi-box";
        div.innerHTML = `
            <div>${x[0]}</div>
            <div class="kpi-value">${x[1].toFixed(2)}</div>
        `;
        el.appendChild(div);
    });
}

// ================= CHART =================
function renderChart(){

    if (chart) chart.destroy();

    chart = new Chart(document.getElementById("chart"), {
        type: "line",
        data: {
            labels: DATA.dates,
            datasets: [{
                data: DATA.values,
                borderColor: "#60a5fa",
                pointRadius: 0,
                tension: 0.25
            }]
        },
        options: {
            responsive: true,
            plugins: {
                legend: { display: false }
            },
            scales: {
                x: { ticks: { color: "#9ca3af" } },
                y: { ticks: { color: "#9ca3af" } }
            }
        }
    });
}

// ================= REFRESH =================
function refreshData(){
    loadData();
}

// INIT
loadData();

</script>

</body>
</html>
