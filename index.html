<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Débit Québec — Tableau de bord</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

<style>

body{
    margin:0;
    font-family:"Segoe UI", Arial;
    background:#0b1220;
    color:#e5e7eb;
}

header{
    background:#0f172a;
    padding:14px 18px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    border-bottom:1px solid #1f2937;
}

h1{
    margin:0;
    font-size:15px;
    color:#93c5fd;
}

button{
    background:#2563eb;
    color:white;
    border:none;
    padding:8px 12px;
    border-radius:8px;
    cursor:pointer;
    margin-left:6px;
}

button:hover{ background:#1d4ed8; }

.container{
    padding:18px;
    max-width:1400px;
    margin:auto;
}

.card{
    background:#111827;
    border:1px solid #1f2937;
    border-radius:14px;
    padding:16px;
    margin-bottom:18px;
}

canvas{
    width:100% !important;
    height:420px !important;
}

/* KPI */
.kpi{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:12px;
    margin-bottom:18px;
}

.kpi-box{
    background:#111827;
    border:1px solid #1f2937;
    border-radius:12px;
    padding:12px;
}

.kpi-title{
    font-size:12px;
    color:#93c5fd;
}

.kpi-value{
    font-size:18px;
    font-weight:700;
    color:#60a5fa;
    margin-top:4px;
}

/* TABLE */
table{
    width:100%;
    border-collapse:collapse;
}

th, td{
    padding:10px;
    border-bottom:1px solid #1f2937;
}

th{
    text-align:left;
    color:#93c5fd;
}

td{
    text-align:right;
}

td:first-child{
    text-align:left;
}

select{
    padding:8px;
    border-radius:8px;
    background:#111827;
    color:white;
    border:1px solid #1f2937;
}

#status{
    margin-bottom:10px;
    color:#fbbf24;
    font-size:13px;
}

</style>
</head>

<body>

<header>
    <h1>Débit Québec — Tableau de bord exécutif</h1>
    <div>
        <button onclick="refresh()">🔄 Mise à jour</button>
        <button onclick="downloadCSV()">⬇ Télécharger CSV</button>
    </div>
</header>

<div class="container">

<div id="status">Chargement...</div>

<div class="kpi" id="kpi"></div>

<div class="card">
    <h3>📈 Débit annuel</h3>
    <canvas id="annualChart"></canvas>
</div>

<div class="card">
    <h3>📊 Débit mensuel (total)</h3>
    <canvas id="monthlyChart"></canvas>
</div>

<div class="card">
    <h3>📅 Analyse par mois</h3>
    <select id="monthSelect" onchange="renderMonth()"></select>
    <canvas id="monthChart" style="margin-top:12px;"></canvas>
</div>

<div class="card">
    <h3>📋 Statistiques</h3>
    <table>
        <tbody id="stats"></tbody>
    </table>
</div>

</div>

<script>

const CSV_URL = "./data.csv";

let annualChart, monthlyChart, monthChart;
let DATA;

// ================= LOAD =================
async function load(){

    document.getElementById("status").innerText = "Chargement des données...";

    const res = await fetch(CSV_URL + "?v=" + Date.now());
    const text = await res.text();

    const parsed = Papa.parse(text, {
        header:true,
        skipEmptyLines:true,
        delimitersToGuess:["\t",",",";"]
    });

    let raw = [];

    parsed.data.forEach(r=>{
        if(!r.Date || !r.Debit) return;

        const v = parseFloat(r.Debit);
        if(isNaN(v)) return;

        raw.push({
            date:r.Date,
            debit:v
        });
    });

    DATA = process(raw);
    renderAll();

    document.getElementById("status").innerText =
        "✔ Données chargées : " + raw.length + " lignes";
}

// ================= PROCESS =================
function process(raw){

    const values = raw.map(d=>d.debit);

    const sum = values.reduce((a,b)=>a+b,0);
    const mean = sum / values.length;
    const min = Math.min(...values);
    const max = Math.max(...values);

    // MONTHLY SUM
    const monthly = {};
    raw.forEach(r=>{
        const m = r.date.slice(3,10);
        monthly[m] = (monthly[m] || 0) + r.debit;
    });

    return {
        raw,
        kpi:{sum,mean,min,max},
        monthly:{
            labels:Object.keys(monthly),
            values:Object.values(monthly)
        }
    };
}

// ================= RENDER ALL =================
function renderAll(){
    renderKPI();
    renderAnnual();
    renderMonthly();
    fillMonths();
    renderStats();
}

// ================= KPI =================
function renderKPI(){

    const k = DATA.kpi;

    const html = [
        ["Somme",k.sum],
        ["Moyenne",k.mean],
        ["Min",k.min],
        ["Max",k.max]
    ].map(x=>`
        <div class="kpi-box">
            <div class="kpi-title">${x[0]}</div>
            <div class="kpi-value">${x[1].toFixed(2)}</div>
        </div>
    `).join("");

    document.getElementById("kpi").innerHTML = html;
}

// ================= ANNUAL =================
function renderAnnual(){

    if(annualChart) annualChart.destroy();

    annualChart = new Chart(document.getElementById("annualChart"),{
        type:"line",
        data:{
            labels:DATA.raw.map((d,i)=>{
                const step = Math.ceil(DATA.raw.length/12);
                return i % step === 0 ? d.date : "";
            }),
            datasets:[{
                data:DATA.raw.map(d=>d.debit),
                borderColor:"#60a5fa",
                pointRadius:0,
                tension:0.25
            }]
        },
        options:{
            responsive:true,
            maintainAspectRatio:false,
            plugins:{legend:{display:false}},
            scales:{
                x:{
                    ticks:{
                        maxRotation:0,
                        autoSkip:true,
                        maxTicksLimit:10
                    }
                },
                y:{
                    ticks:{precision:0}
                }
            }
        }
    });
}

// ================= MONTHLY =================
function renderMonthly(){

    if(monthlyChart) monthlyChart.destroy();

    monthlyChart = new Chart(document.getElementById("monthlyChart"),{
        type:"bar",
        data:{
            labels:DATA.monthly.labels,
            datasets:[{
                data:DATA.monthly.values,
                backgroundColor:"#2563eb"
            }]
        },
        options:{
            responsive:true,
            maintainAspectRatio:false,
            plugins:{legend:{display:false}},
            scales:{
                x:{
                    ticks:{
                        maxRotation:0,
                        autoSkip:true
                    }
                }
            }
        }
    });
}

// ================= MONTH SELECT =================
function fillMonths(){

    const sel = document.getElementById("monthSelect");
    sel.innerHTML = "";

    DATA.monthly.labels.forEach(m=>{
        const opt = document.createElement("option");
        opt.value = m;
        opt.textContent = m;
        sel.appendChild(opt);
    });

    renderMonth();
}

// ================= MONTH DETAIL =================
function renderMonth(){

    const m = document.getElementById("monthSelect").value;
    const data = DATA.raw.filter(d=>d.date.includes(m));

    if(monthChart) monthChart.destroy();

    monthChart = new Chart(document.getElementById("monthChart"),{
        type:"line",
        data:{
            labels:data.map(d=>d.date),
            datasets:[{
                data:data.map(d=>d.debit),
                borderColor:"#22c55e",
                pointRadius:2
            }]
        },
        options:{
            responsive:true,
            maintainAspectRatio:false,
            plugins:{legend:{display:false}}
        }
    });
}

// ================= STATS =================
function renderStats(){

    const k = DATA.kpi;

    const rows = [
        ["Somme",k.sum],
        ["Moyenne",k.mean],
        ["Minimum",k.min],
        ["Maximum",k.max]
    ];

    document.getElementById("stats").innerHTML =
        rows.map(r=>`
        <tr>
            <td>${r[0]}</td>
            <td>${r[1].toFixed(2)}</td>
        </tr>
        `).join("");
}

// ================= DOWNLOAD =================
function downloadCSV(){
    window.location.href = CSV_URL;
}

// ================= REFRESH =================
function refresh(){
    load();
}

load();

</script>

</body>
</html>
