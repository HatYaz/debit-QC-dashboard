<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<title>Débit Québec — Tableau de bord</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

<style>
body {
    margin:0;
    font-family:"Segoe UI", Arial;
    background:#0b1220;
    color:#e5e7eb;
}

header {
    background:#0f172a;
    padding:14px 18px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    border-bottom:1px solid #1f2937;
}

h1 {
    margin:0;
    font-size:16px;
    color:#93c5fd;
}

button {
    background:#2563eb;
    color:white;
    border:none;
    padding:8px 12px;
    border-radius:8px;
    cursor:pointer;
    margin-left:8px;
}

button:hover { background:#1d4ed8; }

.container { padding:18px; }

.card {
    background:#111827;
    padding:14px;
    border-radius:12px;
    border:1px solid #1f2937;
    margin-bottom:18px;
}

.kpi {
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:12px;
    margin-bottom:18px;
}

.kpi-box {
    background:#111827;
    padding:14px;
    border-radius:12px;
    border:1px solid #1f2937;
}

.kpi-value {
    font-size:18px;
    font-weight:700;
    color:#60a5fa;
}

canvas {
    width:100% !important;
    height:420px !important;
}

table {
    width:100%;
    border-collapse:collapse;
    font-size:13px;
}

th, td {
    padding:10px;
    border-bottom:1px solid #1f2937;
}

th {
    color:#93c5fd;
    text-align:left;
}

td {
    color:#e5e7eb;
    text-align:right;
}

td:first-child {
    text-align:left;
}

#status {
    margin-bottom:10px;
    color:#fbbf24;
    font-size:13px;
}
</style>
</head>

<body>

<header>
    <h1>Débit Québec — Tableau de bord</h1>
    <div>
        <button onclick="refreshData()">🔄 Mise à jour</button>
        <button onclick="downloadCSV()">⬇ Télécharger CSV</button>
    </div>
</header>

<div class="container">

<div id="status">Chargement...</div>

<div class="card">
    <canvas id="chartAnnual"></canvas>
</div>

<div class="card">
    <canvas id="chartMonthly"></canvas>
</div>

<div class="card">
    <h3 style="color:#93c5fd;">Table des statistiques</h3>
    <table>
        <thead>
            <tr>
                <th>Métrique</th>
                <th>Valeur</th>
            </tr>
        </thead>
        <tbody id="statsTable"></tbody>
    </table>
</div>

</div>

<script>

const CSV_URL = "./data.csv";

let annualChart = null;
let monthlyChart = null;
let DATA = null;

// ================= LOAD =================
async function loadData(){

    try {

        document.getElementById("status").innerText = "Chargement des données...";

        const res = await fetch(CSV_URL + "?v=" + Date.now());
        const text = await res.text();

        const parsed = Papa.parse(text, {
            header:true,
            skipEmptyLines:true,
            delimitersToGuess:["\t",",",";"]
        });

        let raw = [];

        for (let r of parsed.data) {

            const date = r.Date;
            const debit = r.Debit;

            if(!date || !debit) continue;

            raw.push({
                date: date,
                debit: parseFloat(debit)
            });
        }

        DATA = build(raw);
        render();

        document.getElementById("status").innerText =
            "✔ Données chargées : " + raw.length + " lignes";

    } catch(err){
        console.error(err);
        document.getElementById("status").innerText =
            "❌ Erreur chargement";
    }
}

// ================= BUILD =================
function build(raw){

    let values = raw.map(d=>d.debit);

    let sum = values.reduce((a,b)=>a+b,0);
    let mean = sum / values.length;
    let min = Math.min(...values);
    let max = Math.max(...values);

    // monthly aggregation
    let monthlyMap = {};

    raw.forEach(r=>{
        let m = r.date.slice(3,10); // MM/YYYY approx
        if(!monthlyMap[m]) monthlyMap[m] = [];
        monthlyMap[m].push(r.debit);
    });

    let monthlyLabels = Object.keys(monthlyMap);
    let monthlyValues = monthlyLabels.map(k =>
        monthlyMap[k].reduce((a,b)=>a+b,0) / monthlyMap[k].length
    );

    return {
        raw,
        kpi:{sum,mean,min,max},
        monthly:{labels:monthlyLabels, values:monthlyValues}
    };
}

// ================= RENDER =================
function render(){
    renderAnnual();
    renderMonthly();
    renderTable();
}

// ================= ANNUAL =================
function renderAnnual(){

    if(annualChart) annualChart.destroy();

    annualChart = new Chart(document.getElementById("chartAnnual"), {
        type:"line",
        data:{
            labels: DATA.raw.map(d=>d.date),
            datasets:[{
                data: DATA.raw.map(d=>d.debit),
                borderColor:"#60a5fa",
                pointRadius:0,
                tension:0.2
            }]
        },
        options:{
            plugins:{legend:{display:false}}
        }
    });
}

// ================= MONTHLY =================
function renderMonthly(){

    if(monthlyChart) monthlyChart.destroy();

    monthlyChart = new Chart(document.getElementById("chartMonthly"), {
        type:"bar",
        data:{
            labels: DATA.monthly.labels,
            datasets:[{
                data: DATA.monthly.values,
                backgroundColor:"#2563eb"
            }]
        },
        options:{
            plugins:{legend:{display:false}}
        }
    });
}

// ================= TABLE =================
function renderTable(){

    const k = DATA.kpi;

    const rows = [
        ["Somme", k.sum],
        ["Moyenne", k.mean],
        ["Minimum", k.min],
        ["Maximum", k.max]
    ];

    const tbody = document.getElementById("statsTable");
    tbody.innerHTML = "";

    rows.forEach(r=>{
        let tr = document.createElement("tr");
        tr.innerHTML = `
            <td>${r[0]}</td>
            <td>${r[1].toFixed(2)}</td>
        `;
        tbody.appendChild(tr);
    });
}

// ================= DOWNLOAD CSV =================
function downloadCSV(){
    const a = document.createElement("a");
    a.href = CSV_URL;
    a.download = "Debit_Quebec.csv";
    a.click();
}

// ================= REFRESH =================
function refreshData(){
    loadData();
}

loadData();

</script>

</body>
</html>
