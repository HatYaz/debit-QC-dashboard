<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Débit Québec — Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

<style>

/* ================= LIGHT PROFESSIONAL THEME ================= */

body{
    margin:0;
    font-family:"Segoe UI", Arial;
    background:#f5f7fb;
    color:#1f2937;
}

/* HEADER */
header{
    background:#ffffff;
    padding:14px 18px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    border-bottom:1px solid #e5e7eb;
}

h1{
    margin:0;
    font-size:18px;
    color:#1e3a8a;
}

/* BUTTONS */
button{
    background:#2563eb;
    color:white;
    border:none;
    padding:10px 14px;
    border-radius:10px;
    cursor:pointer;
    font-size:14px;
    margin-left:6px;
}

button:hover{ background:#1d4ed8; }

/* CONTAINER */
.container{
    padding:20px;
    max-width:1400px;
    margin:auto;
}

/* KPI */
.kpi{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:14px;
    margin-bottom:18px;
}

.kpi-box{
    background:#ffffff;
    border:1px solid #e5e7eb;
    border-radius:12px;
    padding:14px;
}

.kpi-title{
    font-size:14px;
    color:#6b7280;
}

.kpi-value{
    font-size:22px;
    font-weight:700;
    color:#2563eb;
    margin-top:6px;
}

/* CARD */
.card{
    background:#ffffff;
    border:1px solid #e5e7eb;
    border-radius:14px;
    padding:16px;
    margin-bottom:18px;
}

/* CANVAS */
canvas{
    width:100% !important;
    height:420px !important;
}

/* SELECT */
select{
    padding:10px;
    border-radius:10px;
    background:#ffffff;
    color:#1f2937;
    border:1px solid #d1d5db;
    font-size:14px;
}

/* STATUS */
#status{
    margin-bottom:10px;
    color:#b45309;
    font-size:14px;
}

</style>
</head>

<body>

<header>
    <h1>Débit Québec — Tableau de bord exécutif</h1>
    <div>
        <button onclick="refresh()">🔄 Mise à jour</button>
        <button onclick="downloadCSV()">⬇ Télécharger CSV</button>
    </div>
</header>

<div class="container">

<div id="status">Chargement des données...</div>

<div class="kpi" id="kpi"></div>

<div class="card">
    <h3>📈 Débit annuel</h3>
    <canvas id="annualChart"></canvas>
</div>

<div class="card">
    <h3>📊 Débit mensuel (total)</h3>
    <canvas id="monthlyChart"></canvas>
</div>

<div class="card">
    <h3>📅 Analyse par mois</h3>
    <select id="monthSelect" onchange="renderMonth()"></select>
    <canvas id="monthChart" style="margin-top:12px;"></canvas>
</div>

</div>

<script>

const CSV_URL = "./data.csv";

let annualChart, monthlyChart, monthChart;
let DATA;

// ================= LOAD =================
async function load(){

    document.getElementById("status").innerText = "Chargement...";

    const res = await fetch(CSV_URL + "?v=" + Date.now());
    const text = await res.text();

    const parsed = Papa.parse(text, {
        header:true,
        skipEmptyLines:true,
        delimitersToGuess:["\t",",",";"]
    });

    let raw = [];

    parsed.data.forEach(r=>{
        if(!r.Date || !r.Debit) return;

        const v = parseFloat(r.Debit);
        if(isNaN(v)) return;

        raw.push({
            date:r.Date,
            debit:v
        });
    });

    DATA = process(raw);
    renderAll();

    document.getElementById("status").innerText =
        "✔ Données chargées : " + raw.length + " lignes";
}

// ================= PROCESS =================
function process(raw){

    const values = raw.map(d=>d.debit);

    const sum = values.reduce((a,b)=>a+b,0);
    const mean = sum / values.length;
    const min = Math.min(...values);
    const max = Math.max(...values);

    const monthly = {};
    raw.forEach(r=>{
        const m = r.date.slice(3,10);
        monthly[m] = (monthly[m] || 0) + r.debit;
    });

    return {
        raw,
        kpi:{sum,mean,min,max},
        monthly:{
            labels:Object.keys(monthly),
            values:Object.values(monthly)
        }
    };
}

// ================= COMMON CHART OPTIONS =================
const commonOptions = {
    responsive:true,
    maintainAspectRatio:false,
    plugins:{
        legend:{ display:false },   // ✅ removed legend
        tooltip:{
            enabled:true,
            displayColors:false,
            titleFont:{ size:14 },
            bodyFont:{ size:14 }
        }
    },
    scales:{
        x:{
            ticks:{
                font:{ size:13 },
                maxRotation:90,   // ✅ vertical labels
                minRotation:90,
                autoSkip:true,
                maxTicksLimit:12
            }
        },
        y:{
            ticks:{ font:{ size:13 } }
        }
    }
};

// ================= RENDER =================
function renderAll(){
    renderKPI();
    renderAnnual();
    renderMonthly();
    fillMonths();
}

// ================= KPI =================
function renderKPI(){

    const k = DATA.kpi;

    document.getElementById("kpi").innerHTML = `
        <div class="kpi-box"><div class="kpi-title">Somme</div><div class="kpi-value">${k.sum.toFixed(2)}</div></div>
        <div class="kpi-box"><div class="kpi-title">Moyenne</div><div class="kpi-value">${k.mean.toFixed(2)}</div></div>
        <div class="kpi-box"><div class="kpi-title">Minimum</div><div class="kpi-value">${k.min.toFixed(2)}</div></div>
        <div class="kpi-box"><div class="kpi-title">Maximum</div><div class="kpi-value">${k.max.toFixed(2)}</div></div>
    `;
}

// ================= ANNUAL =================
function renderAnnual(){

    if(annualChart) annualChart.destroy();

    annualChart = new Chart(document.getElementById("annualChart"),{
        type:"line",
        data:{
            labels:DATA.raw.map(d=>d.date),
            datasets:[{
                data:DATA.raw.map(d=>d.debit),
                borderColor:"#2563eb",
                pointRadius:0,
                pointHoverRadius:6,
                tension:0.25
            }]
        },
        options: commonOptions
    });
}

// ================= MONTHLY =================
function renderMonthly(){

    if(monthlyChart) monthlyChart.destroy();

    monthlyChart = new Chart(document.getElementById("monthlyChart"),{
        type:"bar",
        data:{
            labels:DATA.monthly.labels,
            datasets:[{
                data:DATA.monthly.values,
                backgroundColor:"#2563eb"
            }]
        },
        options: commonOptions
    });
}

// ================= MONTH SELECT =================
function fillMonths(){

    const sel = document.getElementById("monthSelect");
    sel.innerHTML = "";

    DATA.monthly.labels.forEach(m=>{
        const opt = document.createElement("option");
        opt.value = m;
        opt.textContent = m;
        sel.appendChild(opt);
    });

    renderMonth();
}

// ================= MONTH DETAIL =================
function renderMonth(){

    const m = document.getElementById("monthSelect").value;
    const data = DATA.raw.filter(d=>d.date.includes(m));

    if(monthChart) monthChart.destroy();

    monthChart = new Chart(document.getElementById("monthChart"),{
        type:"line",
        data:{
            labels:data.map(d=>d.date),
            datasets:[{
                data:data.map(d=>d.debit),
                borderColor:"#16a34a",
                pointRadius:2,
                pointHoverRadius:6
            }]
        },
        options: commonOptions
    });
}

// ================= DOWNLOAD =================
function downloadCSV(){
    window.location.href = CSV_URL;
}

// ================= REFRESH =================
function refresh(){
    load();
}

load();

</script>

</body>
</html>
